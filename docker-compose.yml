services:
  lark-app:
    build: .
    container_name: openilink-app-lark
    restart: unless-stopped
    environment:
      PORT: "${PORT:-8081}"
      HUB_URL: "${HUB_URL}"
      BASE_URL: "${BASE_URL}"
      DB_PATH: "/data/lark.db"
      LARK_APP_ID: "${LARK_APP_ID:-}"
      LARK_APP_SECRET: "${LARK_APP_SECRET:-}"
      LARK_CHAT_ID: "${LARK_CHAT_ID:-}"
      CONFIG_ENCRYPT_KEY: "${CONFIG_ENCRYPT_KEY}"
    volumes:
      - lark-data:/data

volumes:
  lark-data:
